          \        metric_priority = {\"T2B\": 6, \"肯定会买\": 5, \"T1B\": 4, \"可能会买\": 3, \"B2B\": 2, \"B1B\": 1}\n        best_by_question\
          \ = {}\n        for row in candidate_rows:\n            question_key = row.get(\"question_id\") or row.get(\"question_title\"\
          ) or row.get(\"comparison_id\")\n            current = best_by_question.get(question_key)\n            if current\
