          ,\n            \"concept_test_result_framework\": [\n                \"先用总体接受度、偏好/推荐与购买意愿判断概念是否值得推进\",\n       \
          \         \"再用相关性、易理解、可信、独特、价值感等属性解释强弱项\",\n                \"结合喜欢/不喜欢原因识别驱动因素与阻碍因素；只有存在JAR数据时才使用惩罚分析措辞\",\n   \
