          decision_sequence\": [\"筛选决策问题\", \"建立同口径比较\", \"识别优势与短板\", \"验证受众差异\", \"形成行动建议\"],\n            \"evidence_hierarchy\"\
          : [\"总体核心KPI\", \"Partner/消费者\", \"细分与开放题\", \"风险与反向证据\"],\n            \"recommendation_logic\": [\"证据\", \"判断\"\
