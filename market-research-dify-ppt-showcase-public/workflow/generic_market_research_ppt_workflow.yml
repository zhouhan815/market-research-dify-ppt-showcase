          \ for block in narrative_blocks for text in block.get(\"paragraphs\", []))\n            if narrative_blocks and\
          \ narrative_length < 180:\n                narrative_blocks[0].setdefault(\"paragraphs\", []).append(\n        \
          \            \"研究上应把这些指标放回同一消费者决策链理解：总体吸引力决定是否愿意接近，理解与可信支撑利益承诺，价值感把兴趣转化为购买和推荐。业务不应平均优化所有指标，而应优先关闭对转化影响最大且能够被产品方案、概念文案或渠道话术修复的缺口，并在下一轮用同口径指标验证。\"\
          \n                )\n        slides.append({\n            \"slide_id\": f\"S-{page_no:03d}\", \"page_no\": page_no,\
