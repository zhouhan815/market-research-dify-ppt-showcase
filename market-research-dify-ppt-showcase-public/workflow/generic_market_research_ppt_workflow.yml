          \ source_notes(evidence_ids):\n        notes = []\n        for eid in evidence_ids:\n            row = evidence_map.get(eid)\
          \ or {}\n            source = row.get(\"source\") or {}\n            sheet = str(source.get(\"sheet\") or \"\").strip()\n\
          \            sheet_text = f\"；{sheet}\" if sheet and not sheet.lower().startswith(\"header\") else \"\"\n      \
