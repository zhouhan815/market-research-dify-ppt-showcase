          ,\n    \"text_bands\", \"balanced_columns\",\n}\n\ndef parse_json(text):\n    if isinstance(text, dict):\n     \
          \   return text\n    raw = str(text or \"\").lstrip(\"\\ufeff\").strip()\n    raw = re.sub(r\"<think>.*?</think>\"\
          , \"\", raw, flags=re.I | re.S).strip()\n    raw = re.sub(r\"^```(?:json)?\\s*\", \"\", raw, flags=re.I).strip()\n\
          \    raw = re.sub(r\"\\s*```$\", \"\", raw).strip()\n    decoder = json.JSONDecoder()\n    for index, char in enumerate(raw):\n\
          \        if char != \"{\":\n            continue\n        try:\n            value, _ = decoder.raw_decode(raw[index:])\n\
          \            if isinstance(value, dict):\n                return value\n        except json.JSONDecodeError:\n \
          \           continue\n    if raw.count(\"{\") > raw.count(\"}\"):\n        raise ValueError(\"LLM output was truncated\
          \ before the JSON object was complete\")\n    raise ValueError(\"No complete JSON object found in LLM output\")\n\
          \ndef presentation_text(value):\n    if value is None:\n        return \"\"\n    if isinstance(value, str):\n  \
          \      text = value.strip()\n        if (text.startswith(\"{\") and text.endswith(\"}\")) or (text.startswith(\"\
          [\") and text.endswith(\"]\")):\n            try:\n                import ast\n                return presentation_text(ast.literal_eval(text))\n\
          \            except Exception:\n                description = re.search(r\"['\\\"]description['\\\"]\\s*:\\s*['\\\
          \"]([^'\\\"]+)\", text)\n                if description:\n                    return description.group(1)\n    \
          \    return text\n    if isinstance(value, (int, float, bool)):\n        return str(value)\n    if isinstance(value,\
