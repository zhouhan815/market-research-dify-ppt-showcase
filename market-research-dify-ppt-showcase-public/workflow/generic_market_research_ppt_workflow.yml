          \                \"输出必须明确：推荐哪个概念、必须保留什么、必须修复什么、下一轮如何验证\"\n            ],\n            \"decision_language_rule\"\
          : \"先给明确业务结论，再交代置信度和限制；禁止用数据缺口代替对现有证据的判断。\"\n        },\n        \"analysis_modules\": analysis_modules,\n     \
          \   \"chart_blueprints\": chart_blueprints,\n        \"comparisons\": selected_comparisons,\n        \"ranked_evidence\"\
          : ranked,\n        \"reference_report_outline\": package.get(\"reference_report_outline\", []),\n        \"quality\"\
