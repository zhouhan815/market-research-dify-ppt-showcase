          \        if len(blueprint_rows) >= 2:\n            chart_blueprints.append({\n                \"blueprint_id\":\
          \ f\"CHART-{module_id}\",\n                \"module_id\": module_id,\n                \"title\": f\"{label}：概念 C1\
          \ 与 C2 多指标对比\",\n                \"chart_type\": \"grouped_bar\",\n                \"categories\": [f\"{str(row.get('question_title')\
          \ or row.get('question_id'))[:16]} ({row.get('metric_label')})\" for row in blueprint_rows],\n                \"\
          series\": [\n                    {\"name\": \"C1\", \"values\": [row.get(\"concept_values\", {}).get(\"C1\", {}).get(\"\
          value\") for row in blueprint_rows]},\n                    {\"name\": \"C2\", \"values\": [row.get(\"concept_values\"\
          , {}).get(\"C2\", {}).get(\"value\") for row in blueprint_rows]},\n                ],\n                \"unit\"\
          : \"percent\" if blueprint_rows[0].get(\"metric_label\") in percentage_labels else blueprint_rows[0].get(\"unit\"\
          ),\n                \"comparison_ids\": [row[\"comparison_id\"] for row in blueprint_rows],\n                \"\
          evidence_ids\": [eid for row in blueprint_rows for eid in row.get(\"evidence_ids\", [])],\n            })\n\n  \
          \  matrix = {\n        \"schema_version\": \"research-analysis-matrix/1.0\",\n        \"project\": package.get(\"\
