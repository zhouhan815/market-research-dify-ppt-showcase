    nodes:
    - data:
        desc: 上传市场调研 Excel，并说明本次报告最需要回答的业务问题。参考 PPT 和服务地址均已内置。
        title: 开始
        type: start
        variables:
        - allowed_file_extensions:
          - .xlsx
          allowed_file_types:
          - document
          allowed_file_upload_methods:
          - local_file
          - remote_url
          label: Market Research Data Excel
          required: true
          type: file
          variable: data_file
        - label: Business Focus
          max_length: 3000
          options: []
          required: true
          type: paragraph
          variable: business_focus
      height: 150
      id: start
      position:
        x: 80
        y: 300
      type: custom
      width: 244
    - data:
        authorization:
          config: null
          type: no-auth
        body:
          data:
          - file:
            - start
            - data_file
            key: data_file
            type: file
          - key: business_focus
            type: text
            value: '{{#start.business_focus#}}'
          - key: max_evidence
            type: text
            value: '600'
          type: form-data
        desc: 以 multipart/form-data 直接上传 Excel 文件字节，解析题目块、Base、指标、概念、分群、显著性和来源位置。
        headers: ''
        method: post
        params: ''
        ssl_verify: true
        timeout:
          connect: 30
          read: 600
          write: 600
          max_connect_timeout: 30
          max_read_timeout: 600
          max_write_timeout: 600
        title: 解析市场调研 Excel
        type: http-request
        url: http://host.docker.internal:8077/extract-market-data
        retry_config:
          max_retries: 2
          retry_enabled: true
          retry_interval: 2000
        error_strategy: default-value
        default_value:
        - key: body
          type: string
          value: '{"status":"error","message":"Excel解析接口失败、超时或返回不可用结果。请确认pptx-author服务已启动，文件为xlsx且数据结构为概念测试表。","research_evidence":{"schema_version":"research-evidence/1.0","project":{},"metric_definitions":[],"evidence_registry":[],"reference_report_outline":[],"quality":{"validation_errors":["extract_market_data
            HTTP request failed or timed out"],"normalized_evidence_count":0}}}'
        - key: status_code
          type: number
          value: 599
        - key: files
          type: array[file]
          value: []
      height: 150
      id: extract_market_data
      position:
        x: 380
        y: 300
      type: custom
      width: 244
    - data:
        code: "import json\n\nMAX_STRING_CHARS = 380000\n\ndef parse_json(value):\n    if isinstance(value, dict):\n     \
          \   return value\n    if value is None:\n        return {}\n    return json.loads(str(value).strip())\n\ndef compact_package(package,\
          \ evidence):\n    package[\"reference_report_outline\"] = [\n        {\n            \"page_no\": item.get(\"page_no\"\
          ),\n            \"title\": str(item.get(\"title\") or (item.get(\"texts\") or [\"\"])[0])[:240],\n            \"\
          key_texts\": [str(text)[:240] for text in item.get(\"key_texts\", (item.get(\"texts\") or [])[1:4])]\n        }\n\
          \        for item in package.get(\"reference_report_outline\", [])\n    ]\n\n    def refresh():\n        used_metric_ids\
          \ = {item.get(\"metric_id\") for item in evidence}\n        package[\"metric_definitions\"] = [\n            item\
          \ for item in package.get(\"metric_definitions\", [])\n            if item.get(\"metric_id\") in used_metric_ids\n\
          \        ]\n        package[\"evidence_registry\"] = evidence\n        quality = package.setdefault(\"quality\"\
          , {})\n        quality[\"normalized_evidence_count\"] = len(evidence)\n        return json.dumps(package, ensure_ascii=False,\
          \ separators=(\",\", \":\"))\n\n    serialized = refresh()\n    original_count = len(evidence)\n    while len(serialized)\
          \ > MAX_STRING_CHARS and len(evidence) > 100:\n        del evidence[max(100, len(evidence) - 25):]\n        serialized\
          \ = refresh()\n    quality = package.setdefault(\"quality\", {})\n    quality[\"length_trimmed\"] = len(evidence)\
          \ < original_count\n    quality[\"serialized_character_count\"] = len(serialized)\n    return json.dumps(package,\
          \ ensure_ascii=False, separators=(\",\", \":\"))\n\ndef main(extract_response: str) -> dict:\n    errors = []\n\
          \    try:\n        payload = parse_json(extract_response)\n        upstream_status = str(payload.get(\"status\"\
          ) or \"\").lower()\n        upstream_message = str(payload.get(\"message\") or \"\").strip()\n        package =\
          \ payload.get(\"research_evidence\", payload)\n        if not isinstance(package, dict):\n            package =\
          \ {}\n            errors.append(\"extract_market_data response does not contain a research_evidence object\")\n\
          \        quality = package.get(\"quality\") if isinstance(package.get(\"quality\"), dict) else {}\n        for upstream_error\
          \ in quality.get(\"validation_errors\", []) or []:\n            error_text = str(upstream_error).strip()\n     \
          \       if error_text and error_text not in errors:\n                errors.append(error_text)\n        if upstream_status\
          \ in {\"error\", \"failed\", \"fail\"}:\n            detail = upstream_message or \"no message\"\n            errors.append(f\"\
          extract_market_data returned {upstream_status}: {detail}\")\n        if package.get(\"schema_version\") != \"research-evidence/1.0\"\
          :\n            errors.append(\"research evidence schema_version must be research-evidence/1.0\")\n        evidence\
          \ = package.get(\"evidence_registry\")\n        if not isinstance(evidence, list) or not evidence:\n           \
          \ errors.append(\"evidence_registry is empty\")\n            evidence = []\n\n        seen = set()\n        normalized\
          \ = []\n        for item in evidence:\n            evidence_id = str(item.get(\"evidence_id\", \"\")).strip()\n\
          \            if not evidence_id or evidence_id in seen:\n                continue\n            seen.add(evidence_id)\n\
          \            item.setdefault(\"audience\", \"All\")\n            item.setdefault(\"concept_id\", \"UNSPECIFIED\"\
          )\n            item.setdefault(\"segment\", {\"dimension\": \"total\", \"value\": \"total\"})\n            item.setdefault(\"\
          base_quality\", \"unknown\")\n            item.setdefault(\"significance\", {\"tested\": False})\n            item.setdefault(\"\
          source\", {})\n            normalized.append(item)\n\n        package[\"evidence_registry\"] = normalized\n    \
          \    quality = package.get(\"quality\", {})\n        quality[\"normalized_evidence_count\"] = len(normalized)\n\
          \        quality[\"validation_errors\"] = errors\n        package[\"quality\"] = quality\n        research_evidence\
          \ = compact_package(package, normalized)\n        return {\n            \"research_evidence\": research_evidence,\n\
          \            \"quality_report\": json.dumps(quality, ensure_ascii=False, separators=(\",\", \":\")),\n         \
          \   \"status\": \"ok\" if normalized else \"failed\"\n        }\n    except Exception as exc:\n        return {\n\
          \            \"research_evidence\": \"{}\",\n            \"quality_report\": json.dumps({\"validation_errors\":\
          \ [str(exc)]}, ensure_ascii=False),\n            \"status\": \"failed\"\n        }\n"
        code_language: python3
        desc: 将服务响应规范化为 ResearchEvidencePackage；有证据则继续并保留质量警告，无可用证据则进入输入异常出口。
        outputs:
          quality_report:
            type: string
          research_evidence:
            type: string
          status:
            type: string
        title: 标准化研究证据
        type: code
        variables:
        - value_selector:
          - extract_market_data
          - body
          variable: extract_response
      height: 150
      id: normalize_research_data
      position:
        x: 680
        y: 300
      type: custom
      width: 244
    - data:
        cases:
        - case_id: research_data_ready
          conditions:
          - comparison_operator: is
            id: check_research_data_status_condition
            value: ok
            variable_selector:
            - normalize_research_data
            - status
          id: research_data_ready
          logical_operator: and
        desc: 只有解析出至少一条标准化证据时才继续；否则直接输出输入/解析异常诊断，避免用空数据生成假报告。
        logical_operator: and
        title: 检查研究数据是否可继续
        type: if-else
      height: 126
      id: check_research_data_status
      position:
        x: 980
        y: 300
      type: custom
      width: 244
    - data:
        desc: Excel格式、接口响应或证据结构不可用时停止生成PPT，并输出可操作诊断。
        outputs:
        - value_selector:
          - normalize_research_data
          - status
          variable: workflow_status
        - value_selector:
          - normalize_research_data
          - quality_report
          variable: diagnostic_report
        - value_selector:
          - normalize_research_data
          - research_evidence
          variable: research_evidence
        title: 输出输入异常诊断
        type: end
      height: 150
      id: end_input_error
      position:
        x: 1280
        y: 520
      type: custom
      width: 244
    - data:
        code: "import json\nimport re\n\nfrom collections import defaultdict\n\nSUMMARY_LABELS = {\"T1B\", \"T2B\", \"B1B\"\
          , \"B2B\", \"Mean\", \"肯定会买\", \"可能会买\"}\nMAX_COMPARISONS = 72\nMAX_RANKED_EVIDENCE = 48\n\nMODULE_RULES = [\n \
          \   (\"concept_appeal\", \"概念吸引力\", \"哪个概念更能激发喜欢、推荐和购买？\", (\"喜欢\", \"推荐\", \"购买\", \"意愿\", \"偏好\")),\n    (\"communication_diagnostic\"\
          , \"沟通诊断\", \"消费者是否理解、相信并认为概念与自己相关？\", (\"理解\", \"清晰\", \"可信\", \"相关\", \"信息\", \"表达\")),\n    (\"differentiation_positioning\"\
          , \"差异化与定位\", \"概念是否形成独特、清晰且有竞争力的价值定位？\", (\"独特\", \"差异\", \"新颖\", \"定位\", \"卖点\", \"吸引\")),\n    (\"commercial_viability\"\
          , \"商业转化\", \"概念能否支撑价格、价值感和渠道销售？\", (\"价格\", \"价值\", \"销售\", \"难易\", \"溢价\", \"支付\")),\n    (\"drivers_barriers\"\
          , \"驱动与障碍\", \"哪些利益点推动选择，哪些顾虑阻碍转化？\", (\"原因\", \"喜欢的地方\", \"不喜欢\", \"正面\", \"负面\", \"担心\", \"障碍\", \"目的\")),\n \
          \   (\"audience_opportunity\", \"受众机会\", \"Partner 与消费者之间是否存在可行动的需求差异？\", (\"abo\", \"消费者\", \"人群\", \"群体\", \"\
          细分\")),\n]\n\ndef focus_terms(text):\n    parts = re.split(r\"[，,。；;、\\n\\s]+\", text or \"\")\n    return [part\
          \ for part in parts if len(part) >= 2][:20]\n\ndef segment_kind(dimension, value):\n    text = f\"{dimension or\
          \ ''} {value or ''}\".lower()\n    if dimension == \"total\" or value == \"total\":\n        return \"total\"\n\
          \    if \"first read\" in text or \"second read\" in text or \"概念total\" in text:\n        return \"exposure_order\"\
          \n    return \"subgroup\"\n\ndef research_module(item):\n    text = \" \".join([\n        str(item.get(\"question_title\"\
          ) or \"\"),\n        str(item.get(\"metric_label\") or \"\"),\n        str(item.get(\"audience\") or \"\"),\n  \
          \  ]).lower()\n    for module_id, label, question, keywords in MODULE_RULES:\n        if any(keyword.lower() in\
          \ text for keyword in keywords):\n            return module_id\n    return \"concept_appeal\"\n\ndef main(research_evidence:\
          \ str, business_focus: str) -> dict:\n    package = json.loads(research_evidence)\n    evidence = package.get(\"\
          evidence_registry\", [])\n    terms = focus_terms(business_focus)\n    groups = defaultdict(list)\n    for item\
          \ in evidence:\n        segment = item.get(\"segment\") or {}\n        key = (\n            item.get(\"question_id\"\
          ), item.get(\"metric_id\"), item.get(\"audience\"),\n            segment.get(\"dimension\"), segment.get(\"value\"\
          )\n        )\n        groups[key].append(item)\n\n    comparisons = []\n    for key, rows in groups.items():\n \
          \       by_concept = {}\n        for row in rows:\n            concept_id = row.get(\"concept_id\")\n          \
          \  if concept_id in {\"C1\", \"C2\"}:\n                by_concept[concept_id] = row\n        if not all(concept\
          \ in by_concept for concept in (\"C1\", \"C2\")):\n            continue\n        c1, c2 = by_concept[\"C1\"], by_concept[\"\
          C2\"]\n        comparable = (\n            c1.get(\"unit\") == c2.get(\"unit\")\n            and c1.get(\"base_quality\"\
          ) != \"very_small\"\n            and c2.get(\"base_quality\") != \"very_small\"\n        )\n        significance\
          \ = bool(\n            c1.get(\"significance\", {}).get(\"tested\")\n            or c2.get(\"significance\", {}).get(\"\
          tested\")\n        )\n        searchable = \" \".join([\n            str(c1.get(\"question_title\", \"\")), str(c1.get(\"\
          metric_label\", \"\")),\n            str(key[3] or \"\"), str(key[4] or \"\")\n        ])\n        score = 0\n \
          \       score += 30 if c1.get(\"metric_label\") in SUMMARY_LABELS else 0\n        score += 25 if key[3] == \"total\"\
          \ else 0\n        score += 20 if comparable else -20\n        score += 15 if significance else 0\n        score\
          \ += sum(20 for term in terms if term in searchable)\n        comparison = {\n            \"comparison_id\": \"\
          CMP-\" + c1[\"evidence_id\"][3:11] + c2[\"evidence_id\"][3:11],\n            \"question_id\": key[0],\n        \
          \    \"question_title\": c1.get(\"question_title\"),\n            \"metric_id\": key[1],\n            \"metric_label\"\
          : c1.get(\"metric_label\"),\n            \"audience\": key[2],\n            \"segment\": {\"dimension\": key[3],\
          \ \"value\": key[4]},\n            \"segment_kind\": segment_kind(key[3], key[4]),\n            \"concept_values\"\
          : {\n                \"C1\": {\"value\": c1.get(\"value_raw\"), \"display\": c1.get(\"value_display\"), \"base\"\
          : c1.get(\"base\"), \"base_quality\": c1.get(\"base_quality\")},\n                \"C2\": {\"value\": c2.get(\"\
          value_raw\"), \"display\": c2.get(\"value_display\"), \"base\": c2.get(\"base\"), \"base_quality\": c2.get(\"base_quality\"\
          )}\n            },\n            \"delta_c2_vs_c1\": round((c2.get(\"value_raw\") or 0) - (c1.get(\"value_raw\")\
          \ or 0), 4),\n            \"unit\": c1.get(\"unit\"),\n            \"comparable\": comparable,\n            \"significant\"\
          : significance,\n            \"evidence_ids\": [c1[\"evidence_id\"], c2[\"evidence_id\"]],\n            \"score\"\
          : score\n        }\n        comparison[\"research_module\"] = research_module(comparison)\n        comparisons.append(comparison)\n\
          \n    comparisons.sort(key=lambda item: (-item[\"score\"], item[\"question_id\"], item[\"metric_label\"]))\n   \
          \ selected_comparisons = comparisons[:MAX_COMPARISONS]\n    used_ids = {eid for item in selected_comparisons for\
          \ eid in item[\"evidence_ids\"]}\n\n    ranked = sorted(\n        evidence,\n        key=lambda item: (\n      \
          \      0 if item.get(\"base_quality\") == \"very_small\" else 1,\n            1 if item.get(\"metric_label\") in\
          \ SUMMARY_LABELS else 0,\n            item.get(\"value_raw\") or -1\n        ),\n        reverse=True\n    )[:MAX_RANKED_EVIDENCE]\n\
